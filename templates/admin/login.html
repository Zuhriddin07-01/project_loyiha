{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<div class="admin-login-container" style="margin-top: -76px;">
  <div class="admin-login-card fade-in">
    <div class="text-center mb-4">
      <h3 class="fw-bold" style="color: var(--primary);"><i class="bi bi-shield-lock"></i> Admin Panel</h3>
      <p class="text-muted">Sign in to manage ShifoMed</p>
    </div>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label-custom">Username</label>
        <input type="text" name="username" required class="form-control form-control-custom" placeholder="Enter username">
      </div>
      <div class="mb-4">
        <label class="form-label-custom">Password</label>
        <input type="password" name="password" required class="form-control form-control-custom" placeholder="Enter password">
      </div>
      <button type="submit" class="btn btn-primary-custom w-100 py-3"><i class="bi bi-box-arrow-in-right"></i> Sign In</button>
    </form>
    <div class="text-center mt-3">
      <a href="{{ url_for('home') }}" class="text-muted small"><i class="bi bi-arrow-left"></i> Back to website</a>
    </div>
  </div>
</div>
{% endblock %}
