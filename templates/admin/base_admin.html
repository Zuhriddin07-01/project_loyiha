<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block admin_title %}Dashboard{% endblock %} | ShifoMed Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body style="background: var(--bg);">

  <!-- SIDEBAR -->
  <div class="admin-sidebar">
    <div class="px-4 mb-4">
      <a href="{{ url_for('home') }}" class="text-decoration-none">
        <h5 class="text-white fw-bold"><i class="bi bi-heart-pulse-fill"></i> ShifoMed</h5>
      </a>
      <small class="text-secondary">Admin Panel</small>
    </div>
    <nav class="nav flex-column">
      <a class="nav-link {{ 'active' if request.endpoint == 'admin_dashboard' }}" href="{{ url_for('admin_dashboard') }}">
        <i class="bi bi-grid me-2"></i> Dashboard
      </a>
      <a class="nav-link {{ 'active' if request.endpoint in ['admin_doctors', 'admin_add_doctor', 'admin_edit_doctor'] }}" href="{{ url_for('admin_doctors') }}">
        <i class="bi bi-people me-2"></i> Doctors
      </a>
      <a class="nav-link {{ 'active' if request.endpoint == 'admin_appointments' }}" href="{{ url_for('admin_appointments') }}">
        <i class="bi bi-calendar-check me-2"></i> Appointments
      </a>
      <hr class="mx-3" style="border-color: var(--gray-700);">
      <a class="nav-link" href="{{ url_for('home') }}">
        <i class="bi bi-globe me-2"></i> View Website
      </a>
      <a class="nav-link" href="{{ url_for('admin_logout') }}">
        <i class="bi bi-box-arrow-left me-2"></i> Logout
      </a>
    </nav>
  </div>

  <!-- MAIN CONTENT -->
  <div class="admin-content">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block admin_content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
